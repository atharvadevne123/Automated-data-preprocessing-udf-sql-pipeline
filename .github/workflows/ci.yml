name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check . --select E,F,W,I --ignore E501

      - name: Type-check with mypy
        run: mypy split_files.py snowflake_connector.py --ignore-missing-imports

      - name: Run tests with coverage
        run: pytest -v --tb=short --cov=. --cov-report=term-missing --cov-fail-under=75
